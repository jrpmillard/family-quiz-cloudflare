<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Family Quiz Portal</title><link rel="stylesheet" href="/styles.css"></head><body><div class="bg"></div><main class="app"><header class="hero"><div><p class="eyebrow">Ultimate Pinapple Family Apps</p><h1>Family Quiz Portal</h1><p>Pick a player, choose a quiz, beat the leaderboard.</p></div><button id="themeBtn" class="ghost">🌙</button></header><section id="setup" class="panel grid"><div><h2>Start a quiz</h2><label>Name <input id="playerName" maxlength="30" placeholder="Who is playing?"></label><label>Quiz Level <select id="level"><option>Easy</option><option>Medium</option><option>Hard</option></select></label><label>Quiz Length <select id="length"><option value="15">Short - 15 questions</option><option value="25">Medium - 25 questions</option><option value="50">Long - 50 questions</option></select></label><label>Subject <select id="subject"><option>General Knowledge</option><option>Flags</option><option>Music</option><option>Science</option><option>Nature</option><option>Sport</option><option>JW</option></select></label><button id="startBtn" class="primary">Start quiz</button><p id="setupMsg" class="muted"></p></div><div class="cards"><div class="stat"><strong id="gamesPlayed">0</strong><span>Games played</span></div><div class="stat"><strong id="bestScore">0%</strong><span>Best score</span></div><div class="stat"><strong id="achievementCount">0</strong><span>Achievements</span></div></div></section><section id="quiz" class="panel hidden"><div class="quizbar"><span id="qCount"></span><span id="timer">00:00</span><span id="scoreNow">0</span></div><div class="progress"><div id="progressFill"></div></div><article class="question"><div id="visual" class="visual"></div><h2 id="prompt"></h2><div id="answers" class="answers"></div></article></section><section id="results" class="panel hidden"><h2>Quiz complete!</h2><div class="resultScore" id="resultScore"></div><p id="resultDetails"></p><div id="newAchievements" class="badges"></div><button id="againBtn" class="primary">Play again</button></section><section class="panel"><h2>Leaderboards</h2><div class="tabs"><button data-tab="local" class="active">Local</button><button data-tab="online">Online D1</button></div><div id="leaderboard"></div></section></main><script src="/app.js"></script></body></html>
